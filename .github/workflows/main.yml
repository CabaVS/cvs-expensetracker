name: Build & Test

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  DOTNET_VERSION: "8.x"
  PATH_SLN: "./CabaVS.ExpenseTracker.sln"
  PATH_INTEGRATION_TESTS: "./tests/CabaVS.ExpenseTracker.IntegrationTests/CabaVS.ExpenseTracker.IntegrationTests.csproj"

jobs:
  build:
    runs-on: ubuntu-latest
    environment: main-environment
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore solution
        run: dotnet restore ${{ env.PATH_SLN }}

      - name: Build solution
        run: dotnet build ${{ env.PATH_SLN }} --configuration Release --no-restore

      - name: Run Integration Tests
        env:
          ApiToken: ${{ secrets.APITOKEN }}
          Authentication__JwtBearer__SigningKey: ${{ secrets.AUTHENTICATION__JWTBEARER__SIGNINGKEY }}
          Authentication__JwtBearer__Issuer: ${{ secrets.AUTHENTICATION__JWTBEARER__ISSUER }}
          Authentication__JwtBearer__Audience: ${{ secrets.AUTHENTICATION__JWTBEARER__AUDIENCE }}
        run: dotnet test ${{ env.PATH_INTEGRATION_TESTS }} --configuration Release --no-restore --no-build